<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Suite - Editable Table AST Computation Engine</title>
    <link rel="stylesheet" href="./testing/tests.css">
</head>
<body>
    <h1>🧪 AST Computation Engine Test Suite</h1>
    <p>Testing ComputationEngine with AST-based formula evaluation</p>

    <div class="test-controls">
        <button id="run-tests-btn">▶ Run All Tests</button>
        <button id="show-all-btn">Show: All Tests</button>
        <button id="show-failed-btn" class="failed">Failed Only</button>
        <button id="show-passed-btn" class="passed">Passed Only</button>
        <button id="copy-failed-btn" class="copy-btn">📋 Copy Failed Tests Report</button>
        <button id="copy-full-btn" class="copy-btn">📋 Copy Full Test Report</button>
    </div>

    <div class="test-summary" id="test-summary">
        <strong>Summary:</strong> <span id="summary-text">Loading tests...</span>
    </div>

    <table id="test-results">
        <thead>
            <tr>
                <th>#</th>
                <th>Test Name</th>
                <th>Sheet / Cell</th>
                <th>Formula / Input</th>
                <th>Expected Output</th>
                <th>Actual Output</th>
                <th>Result</th>
            </tr>
        </thead>
        <tbody id="test-body">
            <tr>
                <td colspan="7" style="text-align: center;">Loading tests...<\/td>
            </tr>
        </tbody>
    </table>

    <script type="module" src="./testing/tests.js"></script>
</body>
</html>
