<!DOCTYPE html>
<html>
<head>
    <title>Editable Table Viewport</title>
    <link rel="stylesheet" href="edt.css">
</head>
<body>
    <div id="table-container"></div>
    <div id="sheets-nav" class="sheets"></div>
    <div id="position-info"></div>
    <div class="controls">
        <button onclick="moveToTop()">Move to top</button>
        <button onclick="moveToBottom()">Move to bottom</button>
        <button onclick="stepUp()">Step up</button>
        <button onclick="stepDown()">Step down</button>
        <br>
        <button onclick="moveToLeft()">Move to left</button>
        <button onclick="moveToRight()">Move to right</button>
        <button onclick="stepLeft()">Step left</button>
        <button onclick="stepRight()">Step right</button>
    </div>
    <script src="edt.js"></script>
</body>
</html>
