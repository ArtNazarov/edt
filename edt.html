<!DOCTYPE html>
<html>
<head>
    <title>Editable Table Viewport with AST Computation Engine</title>
    <link rel="stylesheet" href="edt.css">
    <link rel="stylesheet" href="mainmenu.css">
    <link rel="stylesheet" href="commandline.css">
    <style>
        /* Additional styles for test page */
        .test-container {
            margin: 20px;
            font-family: monospace;
        }
        .test-table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }
        .test-table th, .test-table td {
            border: 1px solid #ddd;
            padding: 8px 12px;
            text-align: left;
        }
        .test-table th {
            background-color: #4CAF50;
            color: white;
        }
        .test-table tr.passed {
            background-color: #d4edda;
        }
        .test-table tr.failed {
            background-color: #f8d7da;
        }
        .summary {
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 5px;
            font-weight: bold;
        }
        .passed-count {
            color: green;
        }
        .failed-count {
            color: red;
        }
        h1, h2 {
            color: #333;
        }

        /* Selection status info styles */
        .selection-status-info {
            margin: 10px 0;
            padding: 8px 12px;
            background: #e8f4fd;
            border-left: 4px solid #2196F3;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            color: #0b5e7e;
        }
        .selection-status-info span {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="main-menu-container"></div>
    <div id="command-line-container"></div>
    <div id="selection-status-info" class="selection-status-info"> Selection: <span id="selection-status-text">None</span></div>
    <div id="table-container"></div>
    <div id="sheets-nav" class="sheets"></div>
    <div id="position-info"></div>

    <div class="mode-controls">
        <button id="formulas-mode-btn" class="mode-btn active">Switch to Input Formulas Mode</button>
        <button id="results-mode-btn" class="mode-btn">Switch to Compute Results Mode</button>
    </div>

    <script src="edt.js" type="module"></script>
</body>
</html>
